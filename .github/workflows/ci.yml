name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    name: Worker — typecheck, test, bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm test
      - run: npx wrangler deploy --dry-run --outdir /tmp/build

  app:
    name: SPA — typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          # scripts/prerender.mjs imports .ts files directly; Node 22's
          # strip-types flag lets it work without an extra transpile step.
          NODE_OPTIONS: --experimental-strip-types
          VITE_WORKER_URL: https://rede.chat
          VITE_WORKER_WS_URL: wss://rede.chat
          VITE_OAUTH_PROVIDERS: google,apple

  flutter:
    name: Flutter — analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rede_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
